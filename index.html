  <body class="counter-scroll">
    <div id="root"></div>

    <!--
      GSAP and ScrollTrigger are loaded as globals here, exactly as in the
      original template, so Hero.jsx and future section components can
      reference window.gsap / window.ScrollTrigger inside useEffect.
    -->
    <script src="/assets/js/gsap.min.js"></script>
    <script src="/assets/js/ScrollTrigger.min.js"></script>
    <script src="/assets/js/ScrollToPlugin.min.js"></script>
    <script>
      // Make GSAP plugins available on window for components that check them
      if (window.gsap && window.ScrollTrigger) {
        window.gsap.registerPlugin(window.ScrollTrigger, window.ScrollToPlugin);
      }
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
